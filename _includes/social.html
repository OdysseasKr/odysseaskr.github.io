<small class="chip">{{ post.date | date: "%b %-d, %Y" }}</small>
<a class="chip" target="_blank" href="https://twitter.com/intent/tweet?text={{ post.title | cgi_escape }}&url={{ post.url }}"><i class="icon ion-social-twitter"></i> TWEET</a>
<a class="chip" href="{{post.url}}"><i class="icon ion-android-share-alt"></i> LINK</a>
