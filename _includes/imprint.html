{% if site.imprint %}
<h4>Imprint</h4>
<ul>
    {% if site.address %}
    <li>
        <p>{{ site.address }}<br><small>Address</small></p>
    </li>
    {% endif %}


    {% if site.email %}
    <li>
        <p>{{ site.email }}<br><small>Email</small></p>
    </li>
    {% endif %}
</ul>
{% endif %}
