<!DOCTYPE html>
<html lang="{{ site.isolang }}" itemscope itemtype="http://schema.org/WebPage">

{% include head.html %}

<body class="wrap wider post-body">
	<div class="grid post-wrapper">
		<div id="/home" class="unit align-center three-thirds jumbotron">
			<h1> {{page.title}} </h1>
			<h5> By <a href="../../">{{page.author}}</a></h5>
		</div>
		<div class="unit one-fifth"></div>
		<div class="unit three-fifths post-content">

			<small class="chip">Posted on {{ page.date | date: "%b %-d, %Y" }}</small>

			<div class="grid">
				{{ content }}

 				<hr>
				<div id="comments">
					<h2>Comments</h2>
					<div id="header">
						Do you have something to say? Leave a comment on<a href="https://github.com/OdysseasKr/odysseaskr.github.io/issues/{{page.commentsId}}"> this post's issue page on GitHub</a>.
					</div>
				</div>
			</div>
		</div>
		<div class="unit one-fifth"></div>
	</div>
</body>

</html>
